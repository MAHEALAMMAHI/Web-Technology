<!DOCTYPE html>
<html>
<head>
    <title>University Admission Form</title>
</head>
<body>

<h2>University Admission Form</h2>

<form>

    <fieldset>
        <legend>Personal Information</legend>

        <label>Full Name:</label><br>
        <input type="text" name="fullname" maxlength="50" required><br><br>

        <label>Email:</label><br>
        <input type="email" name="email" required><br><br>

        <label>Gender:</label><br>
        <input type="radio" name="gender" value="Male" required> Male
        <input type="radio" name="gender" value="Female"required> Female
        <input type="radio" name="gender" value="Other"required> Other
        <br><br>

        <label>Date of Birth:</label><br>
        <input type="date" name="dob" required>
    </fieldset>

    <br>

    <fieldset>
        <legend>Academic Information</legend>

        <label>Previous School/College:</label><br>
        <input type="text" name="school" maxlength="100" required><br><br>

        <label>Preferred Department:</label><br>
        <select name="department" required>
            <option value="">Select Department</option>
            <option>Computer Science</option>
            <option>Business Administration</option>
            <option>Electrical Engineering</option>
            <option>English</option>
        </select>
        <br><br>

        <label>Interests:</label><br>
        <input type="checkbox" name="interest" value="Sports"> Sports
        <input type="checkbox" name="interest" value="Music"> Music
        <input type="checkbox" name="interest" value="Programming"> Programming
        <br><br>
         <label>Upload Transcript/Resume:</label><br>
          <input type="file" name="document" required>


    </fieldset>
    <br>
    <input type="submit" value="Submit">
    <input type="reset" value="Reset">

</form>

</body>
</html>

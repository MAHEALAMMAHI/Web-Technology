<!DOCTYPE html>
<html>
<head>
    <title>Navigation Bar</title>
    <style>
        nav{
            background-color:lightblue;
             width: 100%;
             padding: 10px;
        }

        nav a{
            display: inline-block;
            color: black;
            padding: 10px 15px;
            margin: 40px;
        }
        nav a:hover{
            background-color: blue;
            color: white;
        }
    </style>
</head>
<body>
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Gallery</a>
        <a href="#">Contact</a>
    </nav>
    
</body>
</html>

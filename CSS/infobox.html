<!DOCTYPE html>
<html>
<head>
    <title>Product Display</title>

    <style>
        .box {
            display: inline-block;
            width: 220px;
            border: 2px solid black;
            background-color: lightgray;
            padding: 15px;
            margin: 10px;
            text-align: center;
        }

        .box:hover {
            outline: 3px solid blue;
            outline-offset: 5px;
        }

        img {
            width: 220px;
            height: 120px;
        }

        a {
            text-decoration: none;
            color: red;
            font-weight: bold;
        }
        a:hover{
            outline: 2px solid black;
            outline-offset: 5px;
            border-radius: 2px;
        }

    </style>
</head>

<body>

<h1 align="center">Product Display</h1>

<div class="box">
    <img src="https://cdn.mos.cms.futurecdn.net/NtgamzDpR5aAymF3K6S7UN.jpg" alt="Laptop">
    <h2>Laptop</h2>
    <p>Fast and powerful laptop.</p>
    <p><b>Price: $800</b></p>
    <a href="#">Buy Now</a>
</div>

<div class="box">
    <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?fm=jpg&q=60&w=3000&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8aGVhZHBob25lc3xlbnwwfHwwfHx8MA%3D%3D" alt="Headphones">
    <h2>Headphones</h2>
    <p>High quality sound.</p>
    <p><b>Price: $100</b></p>
    <a href="#">Buy Now</a>
</div>

<div class="box">
    <img src="https://img.magnific.com/premium-photo/white-modern-smart-watch-mockup-with-strap-white-background-3d-rendering_476612-18565.jpg?semt=ais_hybrid&w=740&q=80" alt="Smartwatch">
    <h2>Smartwatch</h2>
    <p>Track your daily fitness.</p>
    <p><b>Price: $200</b></p>
    <a href="#">Buy Now</a>
</div>

</body>
</html>
